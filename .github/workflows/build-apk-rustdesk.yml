name: build-apk-rustdesk

on:
  workflow_dispatch:
  workflow_call:

env:
  JDK_VERSION: '17'                     # 兼容 Gradle 7.6
  JDK_DISTRIBUTION: 'temurin'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  RUST_VERSION: '1.75'                   # 与官方 CI 保持一致
  CARGO_NDK_VERSION: '3.1.2'
  NDK_VERSION: 'r28c'
  ANDROID_FLUTTER_VERSION: '3.24.5'
  VCPKG_COMMIT_ID: '120deac3062162151622ca4860575a33844ba10b'  # 与官方 CI 一致
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-24.04                  # 使用与官方 CI 相同的镜像
    permissions: write-all

    steps:
      - name: Clean runner environment
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          rm -rf ~/.android/build-cache/
          rm -rf .gradle

      - name: Checkout source repo
        uses: actions/checkout@main
        with:
          repository: rustdesk/rustdesk
          ref: master
          path: rustdesk_source
          fetch-depth: 0
          submodules: recursive

      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup java
        uses: actions/setup-java@main
        with:
          java-version: '${{ env.JDK_VERSION }}'
          distribution: '${{ env.JDK_DISTRIBUTION }}'

      - name: Setup flutter
        uses: subosito/flutter-action@master
        id: flutter-action
        with:
          channel: stable
          flutter-version: ${{ env.ANDROID_FLUTTER_VERSION }}
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake curl gcc-multilib git g++ g++-multilib \
            libayatana-appindicator3-dev libasound2-dev libc6-dev libclang-dev \
            libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgtk-3-dev libpam0g-dev libpulse-dev libva-dev \
            libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxdo-dev libxfixes-dev llvm-dev nasm ninja-build \
            pkg-config tree wget

      - name: Setup NDK
        uses: nttld/setup-ndk@main
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@main
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        working-directory: ./rustdesk_source
        run: |
          ./flutter/build_android_deps.sh arm64-v8a
        shell: bash

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@main
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android
          components: rustfmt

      - uses: Swatinem/rust-cache@main
        with:
          prefix-key: rustdesk-lib-cache
          key: aarch64-linux-android

      - name: Decode and write keys
        working-directory: ./rustdesk_source
        run: |
          if [ ! -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.p12
            echo storeFile='keystore.p12' >> android/key.properties
            echo storePassword='${{ secrets.KEYSTORE_PASSWORD }}' >> android/key.properties
            echo keyAlias='${{ secrets.KEY_ALIAS }}' >> android/key.properties
            echo keyPassword='${{ secrets.KEY_ALIAS_PASSWORD }}' >> android/key.properties
          fi

      - name: Build rustdesk native library
        working-directory: ./rustdesk_source
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add aarch64-linux-android
          cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }} --locked
          ./flutter/ndk_arm64.sh
          mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
          cp ./target/aarch64-linux-android/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so
          cp ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/

      - name: Flutter build release apk
        working-directory: ./rustdesk_source/flutter
        run: |
          flutter build apk --release --target-platform=android-arm64 --split-per-abi

      - name: List generated apk files
        working-directory: ./rustdesk_source
        run: |
          echo "Listing all apk files generated:"
          find ./build/app/outputs -type f -name "*.apk" | sort

      - name: Rename and move
        working-directory: ./rustdesk_source
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          mv "./build/app/outputs/flutter-apk/app-arm64-v8a-release.apk" "${{ github.workspace }}/dist/rustdesk-${{ env.BUILD_DATE }}.apk"

      - name: Erase keystore, encrypt package and create release
        uses: ./ci_source/.github/actions/erase_aes256pac_release/
        with:
          P12_KEYSTORE_PATH: "./rustdesk_source/android/app/keystore.p12 ./rustdesk_source/android/key.properties"
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          BUILD_ARTIFACT_PATH: "./dist/rustdesk-${{ env.BUILD_DATE }}.apk"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-rustdesk"