name: build-apk-fxfocus

on:
  workflow_dispatch:
  workflow_call:

env:
  JDK_VERSION: '21'
  JDK_DISTRIBUTION: 'temurin'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MOZBUILD_STATE_PATH: /home/runner/.mozbuild
  ANDROID_HOME: /home/runner/Android/Sdk

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clean runner environment
        run: |
          set -euo pipefail
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          rm -rf ~/.android/build-cache/
          rm -rf .gradle
          rm -rf ~/.mozbuild

      - name: Checkout ci source repo
        uses: actions/checkout@v4
        with:
          path: ci_source

      - name: Set build date
        run: |
          set -euo pipefail
          echo "BUILD_DATE=$(TZ=UTC-8 date +'%y.%m.%d-%H.%M.%S')" >> $GITHUB_ENV

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          java-version: "${{ env.JDK_VERSION }}"
          distribution: "${{ env.JDK_DISTRIBUTION }}"

      - name: Install system build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            autoconf2.13 \
            build-essential \
            libssl-dev \
            libxml2-utils \
            zip \
            unzip \
            python3 \
            python3-pip \
            python3-venv \
            mercurial \
            curl \
            git

      - name: Install git-cinnabar & clone mozilla-central source
        run: |
          set -euo pipefail
          mkdir -p git-cinnabar
          cd git-cinnabar
          curl -sL https://raw.githubusercontent.com/glandium/git-cinnabar/master/download.py -o download.py
          python3 download.py
          export PATH="$PWD:$PATH"
          echo "$PWD" >> $GITHUB_PATH
          git config --global core.askpass ""
          git config --global cinnabar.check false
          git config --global cinnabar.refs tips
          cd ..
          # 直接从 Mercurial 官方仓库拉取 mozilla-central（包含最新 Focus 代码）
          git clone --depth 1 --branch default hg::https://hg.mozilla.org/mozilla-central/ fxfocus_source

      - name: Bootstrap mozilla build environment
        working-directory: ./fxfocus_source
        run: |
          set -euo pipefail
          ./mach --no-interactive bootstrap \
            --application-choice="mobile_android_artifact_mode" \
            --no-system-changes

      # ========== 新增：缓存依赖以加速后续构建 ==========
      - name: Cache Gradle and mozbuild
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/
            ~/.mozbuild
            fxfocus_source/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('fxfocus_source/**/*.gradle*', 'fxfocus_source/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode keystore and create build configs
        working-directory: ./fxfocus_source
        run: |
          set -euo pipefail
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > mobile/android/focus-android/keystore.p12
          chmod 600 mobile/android/focus-android/keystore.p12

          # ========== 强化 .mozconfig：纯 Artifact 构建，彻底禁用编译 ==========
          cat > .mozconfig <<'EOF'
          # 强制启用 Artifact 构建模式
          export MOZ_ARTIFACT_BUILD_SYMBOLS=1
          ac_add_options --enable-artifact-builds
          # 彻底禁用编译环境（C++ 编译器、链接器等均不配置）
          ac_add_options --disable-compile-environment
          # 指定 Android 目标架构（仅 arm64-v8a，可根据需要修改）
          ac_add_options --target=aarch64-linux-android
          # 使用系统预装的 Android SDK
          ac_add_options --with-android-sdk="$ANDROID_HOME"
          # 启用正式版优化
          ac_add_options --enable-release
          # 禁用不必要的功能以加快构建
          ac_add_options --disable-debug
          ac_add_options --disable-tests
          ac_add_options --disable-updater
          # 指定编译输出目录
          mk_add_options MOZ_OBJDIR=./obj-focus-arm64
          EOF

          # Gradle 签名配置（保持不变）
          cat > init.gradle <<'EOF'
          allprojects {
              afterEvaluate { project ->
                  if (project.plugins.hasPlugin('com.android.application')) {
                      if (!project.android.signingConfigs.hasProperty('release')) {
                          project.android.signingConfigs.create('release')
                      }
                      def cfg = project.android.signingConfigs.release
                      cfg.storeFile = project.rootProject.file('mobile/android/focus-android/keystore.p12')
                      cfg.storePassword = System.getenv('KEYSTORE_PASSWORD')
                      cfg.keyAlias = System.getenv('KEY_ALIAS')
                      cfg.keyPassword = System.getenv('KEY_ALIAS_PASSWORD')
                      cfg.storeType = 'PKCS12'
                      cfg.enableV1Signing = true
                      cfg.enableV2Signing = true
                      cfg.enableV3Signing = true
                      project.android.buildTypes.release.signingConfig = cfg
                  }
              }
          }
          EOF

      - name: Build signed release APK
        working-directory: ./fxfocus_source/mobile/android/focus-android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_ALIAS_PASSWORD: ${{ secrets.KEY_ALIAS_PASSWORD }}
          # 为 Gradle 分配更多内存（避免 OOM 或 GC 卡顿）
          GRADLE_OPTS: "-Xmx4096m -Dorg.gradle.jvmargs=-Xmx4096m"
        run: |
          set -euo pipefail
          chmod +x ./gradlew

          # 优先使用 arm64 构建任务，否则回退到通用 release
          if ./gradlew -q :app:tasks --all | grep -q 'assembleFocusArm64Release'; then
            ./gradlew assembleFocusArm64Release --no-daemon -I ../../init.gradle --info
          else
            ./gradlew assembleRelease --no-daemon -I ../../init.gradle --info
          fi

      - name: List generated APK files
        run: |
          set -euo pipefail
          find "${{ github.workspace }}/fxfocus_source/mobile/android/focus-android/app/build/outputs" -type f -name "*.apk" | sort || true

      - name: Rename and move APK to dist directory
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/dist"
          # 优先选取已签名的 release APK（通常包含 'release' 且不包含 'unsigned'）
          APK_PATH=$(find "${{ github.workspace }}/fxfocus_source/mobile/android/focus-android" -type f -name "*release*.apk" ! -name "*unsigned*" | sort | head -n1 || true)
          if [ -z "$APK_PATH" ]; then
            echo "WARN: No signed release APK found, falling back to any APK"
            APK_PATH=$(find "${{ github.workspace }}/fxfocus_source/mobile/android/focus-android" -type f -name "*.apk" | sort | head -n1 || true)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found in build outputs"
            ls -R "${{ github.workspace }}/fxfocus_source/mobile/android/focus-android" || true
            exit 1
          fi
          cp "$APK_PATH" "${{ github.workspace }}/dist/fxfocus-${{ env.BUILD_DATE }}.apk"
          ls -l "${{ github.workspace }}/dist"

      - name: Erase keystore, encrypt package and create release
        uses: ./ci_source/.github/actions/erase_aes256pac_release/
        with:
          P12_KEYSTORE_PATH: "./fxfocus_source/mobile/android/focus-android/keystore.p12"
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          BUILD_ARTIFACT_PATH: "./dist/fxfocus-${{ env.BUILD_DATE }}.apk"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-fxfocus"