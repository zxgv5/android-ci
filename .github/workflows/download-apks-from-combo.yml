name: download-apks-from-mirror

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "包名（多个用分号分隔）"
        required: true
        default: "com.cxinventor.file.explorer;dev.vodik7.atvtools"
        type: string
      architecture:
        description: "架构（arm64-v8a, armeabi-v7a, universal 等）"
        required: false
        default: "arm64-v8a"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: '20'

      # ======================================================================
      # 使用 apkcombo-downloader 源码进行下载
      # 仓库地址: https://github.com/nirewen/apkcombo-downloader
      # 该项目 fork 自 apkmirror-downloader，API 完全兼容，但目标站点为 APKCombo。
      # 由于 apkcombo-downloader 未发布到 npm 且入口配置不完整，
      # 此处采用直接克隆源码并本地引用的方式，确保模块正确加载。
      # ======================================================================
      - name: Clone apkcombo-downloader source
        run: |
          git clone https://github.com/nirewen/apkcombo-downloader.git
          cd apkcombo-downloader
          npm install   # 安装依赖（包含上游 apkmirror-downloader 的核心模块）

      - name: Download APKs using apkcombo-downloader
        run: |
          set -euo pipefail
          OUT_DIR="./apks-apkcombo-${{ env.BUILD_DATE }}"
          mkdir -p "$OUT_DIR"
          ARCH="${{ inputs.architecture }}"
          PACKAGES_STR="${{ inputs.package_name }}"

          # 创建 Node.js 下载脚本，直接引用克隆的源码目录
          cat > download.js << 'EOF'
          const path = require('path');
          
          // 通过相对路径加载本地克隆的 apkcombo-downloader 模块
          const { APKComboDownloader } = require('./apkcombo-downloader');

          async function downloadPackage(pkg, arch, outDir) {
            // 包名转换为 APKCombo 所需的 org/repo 格式
            // 规则：最后一段为 repo，之前部分以 '-' 连接作为 org
            const parts = pkg.split('.');
            const repo = parts.pop();
            const org = parts.join('-');
            console.log(`[${pkg}] 推导 org=${org}, repo=${repo}, arch=${arch}`);

            const downloader = new APKComboDownloader({ outDir });
            try {
              await downloader.download({ org, repo }, { arch });
              console.log(`[${pkg}] ✅ 下载成功`);
              return true;
            } catch (err) {
              console.error(`[${pkg}] ❌ 下载失败: ${err.message}`);
              return false;
            }
          }

          async function main() {
            const packagesArg = process.argv[2];
            const arch = process.argv[3];
            const outDir = process.argv[4];
            if (!packagesArg || !arch || !outDir) {
              console.error('用法: node download.js "pkg1;pkg2" arch outDir');
              process.exit(1);
            }
            const packages = packagesArg.split(';').map(p => p.trim()).filter(p => p);
            let allSuccess = true;
            for (const pkg of packages) {
              const success = await downloadPackage(pkg, arch, outDir);
              if (!success) allSuccess = false;
            }
            if (!allSuccess) {
              console.error('部分应用下载失败，请检查日志');
              process.exit(1);
            }
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

          node download.js "$PACKAGES_STR" "$ARCH" "$OUT_DIR"

          echo "下载完成，文件清单："
          ls -lh "$OUT_DIR"

      - name: Encrypt apks and create release
        uses: ./ci_source/.github/actions/aes256pac_release/
        with:
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          ARTIFACT_DIRECTORY_PATH: "./apks-apkcombo-${{ env.BUILD_DATE }}"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-from-apkcombo"