name: download-apks-from-mirror

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "包名（多个用分号分隔）"
        required: true
        default: "com.cxinventor.file.explorer;dev.vodik7.atvtools"
        type: string
      architecture:
        description: "架构（arm64-v8a, armeabi-v7a, universal 等）"
        required: false
        default: "arm64-v8a"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: '20'

      # ======================================================================
      # 使用 apkcombo-downloader 实现 APK 下载
      # 仓库地址: https://github.com/nirewen/apkcombo-downloader
      # 该项目 fork 自 https://github.com/tanishqmanuja/apkmirror-downloader
      # 其 CLI 功能依赖于上游项目的核心模块
      # 注意：此包未发布到 npm，故采用本地安装并使用其 CLI 命令
      # ======================================================================
      - name: Install apkcombo-downloader locally
        run: |
          npm init -y
          npm install github:nirewen/apkcombo-downloader

      - name: Download APKs using apkcombo-downloader CLI
        run: |
          set -euo pipefail
          OUT_DIR="./apks-apkcombo-${{ env.BUILD_DATE }}"
          mkdir -p "$OUT_DIR"
          IFS=';' read -ra PACKAGES <<< "${{ inputs.package_name }}"
          ARCH="${{ inputs.architecture }}"

          for pkg in "${PACKAGES[@]}"; do
            # 转换为 apkcombo-downloader 所需的 org/repo 格式
            # 规则：最后一段为 repo，之前部分以 '-' 连接作为 org
            # 例: dev.vodik7.atvtools -> org="dev-vodik7", repo="atvtools"
            org=$(echo "$pkg" | awk -F. '{OFS="-"; $NF=""; sub(/-$/,""); print}')
            repo=$(echo "$pkg" | awk -F. '{print $NF}')
            echo "正在下载: $pkg (org=$org, repo=$repo, arch=$ARCH)"
            # 使用 npx 调用本地安装的 CLI 工具
            npx apkcombo-downloader \
              --org "$org" \
              --repo "$repo" \
              --arch "$ARCH" \
              --out "$OUT_DIR" \
              || echo "::warning::下载失败: $pkg"
          done

          echo "下载完成，输出目录内容："
          ls -lh "$OUT_DIR"

      - name: Encrypt apks and create release
        uses: ./ci_source/.github/actions/aes256pac_release/
        with:
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          ARTIFACT_DIRECTORY_PATH: "./apks-apkcombo-${{ env.BUILD_DATE }}"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-from-apkcombo"