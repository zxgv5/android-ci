name: download-apks-from-mirror

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "包名（多个用分号分隔）"
        required: true
        default: "com.cxinventor.file.explorer;dev.vodik7.atvtools"
        type: string
      architecture:
        description: "架构（arm64-v8a, armeabi-v7a, universal 等）"
        required: false
        default: "arm64-v8a"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.21

      - name: Clone apkmirror-downloader and patch fetch headers
        run: |
          git clone https://github.com/tanishqmanuja/apkmirror-downloader.git
          cd apkmirror-downloader

          # 备份原始文件
          cp src/lib/scrapers/versions.ts src/lib/scrapers/versions.ts.bak
          cp src/lib/scrapers/downloads.ts src/lib/scrapers/downloads.ts.bak

          # 定义通用请求头（模拟真实 Chrome）
          HEADERS="headers: { \
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36', \
            'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8', \
            'Accept-Language': 'en-US,en;q=0.9', \
            'Cookie': 'CONSENT=YES+' \
          }"

          # 补丁1：versions.ts 中的 getVersions 函数
          sed -i "/export function getVersions/,/^}/ {
            s|fetch(repoPageUrl)|fetch(repoPageUrl, { $HEADERS })|
          }" src/lib/scrapers/versions.ts

          # 补丁2：downloads.ts 中的 getFinalDownloadUrl 函数（有两处 fetch）
          sed -i "/export function getFinalDownloadUrl/,/^}/ {
            s|fetch(downloadPageUrl)|fetch(downloadPageUrl, { $HEADERS })|g
            s|fetch(url)|fetch(url, { $HEADERS })|g
          }" src/lib/scrapers/downloads.ts

          echo "=== 已应用补丁，修改内容如下 ==="
          diff -u src/lib/scrapers/versions.ts.bak src/lib/scrapers/versions.ts || true
          diff -u src/lib/scrapers/downloads.ts.bak src/lib/scrapers/downloads.ts || true

      - name: Install dependencies and build
        run: |
          cd apkmirror-downloader
          bun install
          bun run build

      - name: Download APKs using patched apkmd CLI
        run: |
          set -euo pipefail
          OUT_DIR="./apks-apkmirror-${{ env.BUILD_DATE }}"
          mkdir -p "$OUT_DIR"
          IFS=';' read -ra PACKAGES <<< "${{ inputs.package_name }}"
          ARCH="${{ inputs.architecture }}"

          cd apkmirror-downloader

          for pkg in "${PACKAGES[@]}"; do
            # 包名转换为 org/repo（apkmirror 规则）
            org=$(echo "$pkg" | awk -F. '{OFS="-"; $NF=""; sub(/-$/,""); print}')
            repo=$(echo "$pkg" | awk -F. '{print $NF}')
            echo "下载: $pkg -> org=$org repo=$repo arch=$ARCH"
            bun dist/cli.js download "$org" "$repo" \
              --arch "$ARCH" \
              --outdir "../$OUT_DIR" \
              --overwrite \
              || echo "::warning::$pkg 下载失败，继续下一个"
          done

          cd ..
          echo "下载完成，文件清单："
          ls -lh "$OUT_DIR"

      - name: Encrypt apks and create release
        uses: ./ci_source/.github/actions/aes256pac_release/
        with:
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          ARTIFACT_DIRECTORY_PATH: "./apks-apkmirror-${{ env.BUILD_DATE }}"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-from-apkmirror"