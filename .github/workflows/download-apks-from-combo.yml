name: download-apks-from-mirror

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "包名（多个用分号分隔）"
        required: true
        default: "com.cxinventor.file.explorer;dev.vodik7.atvtools"
        type: string
      architecture:
        description: "架构（arm64-v8a, armeabi-v7a, universal 等）"
        required: false
        default: "arm64-v8a"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: '20'

      - name: Clone apkcombo-downloader and install
        run: |
          git clone https://github.com/nirewen/apkcombo-downloader.git
          cd apkcombo-downloader
          npm install
          npm link   # 将 CLI 命令链接到全局

      - name: Download APKs using CLI
        run: |
          set -euo pipefail
          OUT_DIR="./apks-apkcombo-${{ env.BUILD_DATE }}"
          mkdir -p "$OUT_DIR"
          IFS=';' read -ra PACKAGES <<< "${{ inputs.package_name }}"
          ARCH="${{ inputs.architecture }}"

          for pkg in "${PACKAGES[@]}"; do
            # 包名转换为 org/repo
            org=$(echo "$pkg" | awk -F. '{OFS="-"; $NF=""; sub(/-$/,""); print}')
            repo=$(echo "$pkg" | awk -F. '{print $NF}')
            echo "下载: $pkg -> org=$org repo=$repo arch=$ARCH"
            # 使用 CLI 命令（它内部已包含 axios 配置）
            apkcombo-downloader download \
              --org "$org" \
              --repo "$repo" \
              --arch "$ARCH" \
              --out "$OUT_DIR" \
              || echo "::warning::$pkg 下载失败，继续下一个"
          done

          echo "下载完成，输出目录内容："
          ls -lh "$OUT_DIR"

      - name: Encrypt apks and create release
        uses: ./ci_source/.github/actions/aes256pac_release/
        with:
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          ARTIFACT_DIRECTORY_PATH: "./apks-apkcombo-${{ env.BUILD_DATE }}"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-from-apkcombo"