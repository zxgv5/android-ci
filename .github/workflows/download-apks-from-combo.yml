name: download-apks-from-combo

on:
  workflow_dispatch:
    inputs:
      package_names:
        description: "包名"
        required: true
        default: "dev.vodik7.atvtools"
        type: string
      architecture:
        description: "架构"
        required: false
        default: "arm64-v8a"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install apkcombo-downloader
        run: |
          npm install @nirewen/apkcombo-downloader

      - name: Create directory and download apks
        run: |
          set -euo pipefail
          OUT_DIR="./apks-combo-${{ env.BUILD_DATE }}"
          mkdir -p "$OUT_DIR"
          
          # 将输入转为变量
          PACKAGES_STR="${{ inputs.package_names }}"
          DEFAULT_ARCH="${{ inputs.architecture }}"

          cat > download.js << 'EOF'
          const { APKComboDownloader } = require('@nirewen/apkcombo-downloader');

          async function main() {
            const packagesArg = process.argv[2];
            const arch = process.argv[3];
            const outDir = process.argv[4];
            
            if (!packagesArg || !arch || !outDir) {
              console.error('用法: node download.js <包名列表(分号分隔)> <架构> <输出目录>');
              process.exit(1);
            }

            const packages = packagesArg.split(';').map(p => p.trim()).filter(p => p);
            const downloader = new APKComboDownloader({ outDir });

            for (const pkg of packages) {
              // 推导 org（取包名最后一段）和 repo（完整包名）
              const parts = pkg.split('.');
              const org = parts[parts.length - 1];
              const repo = pkg;
              console.log(`下载: ${pkg} (org=${org}, repo=${repo}, arch=${arch})`);
              try {
                await downloader.download({ org, repo }, { arch });
                console.log(`✅ 成功: ${pkg}`);
              } catch (err) {
                console.error(`❌ 失败: ${pkg}`, err.message);
                process.exit(1);
              }
            }
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

          node download.js "$PACKAGES_STR" "$DEFAULT_ARCH" "$OUT_DIR"
          echo "下载完成，文件清单："
          ls -lh "$OUT_DIR"

      - name: Encrypt apks and create release
        uses: ./ci_source/.github/actions/aes256pac_release/
        with:
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          ARTIFACT_DIRECTORY_PATH: "./apks-combo-${{ env.BUILD_DATE }}"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-from-combo"