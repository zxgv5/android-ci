name: download-apks-from-mirror

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "包名（多个用分号分隔）"
        required: true
        default: "com.cxinventor.file.explorer;dev.vodik7.atvtools"
        type: string
      architecture:
        description: "架构（arm64-v8a, armeabi-v7a, universal 等）"
        required: false
        default: "arm64-v8a"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.21

      - name: Clone apkcombo-downloader
        run: git clone https://github.com/nirewen/apkcombo-downloader.git

      - name: Patch to bypass version filtering
        run: |
          cd apkcombo-downloader

          cat > patch.js << 'PATCH'
          const fs = require('fs');
          const path = require('path');

          const indexPath = path.join('src', 'lib', 'index.ts');
          let indexContent = fs.readFileSync(indexPath, 'utf8');

          // 替换版本选择逻辑，强制使用第一个版本
          indexContent = indexContent.replace(
            /const selectedVersion = match\(o\.version \?\? "stable"\)[\s\S]*?\.otherwise\(\(\) => versions\.find\(isStableVersion\)\);/,
            `const selectedVersion = versions[0]; // Patched: always use first version`
          );

          fs.writeFileSync(indexPath, indexContent);
          console.log('✅ Patched index.ts to use first version');
          PATCH

          bun patch.js

      - name: Install dependencies
        run: |
          cd apkcombo-downloader
          bun install --ignore-scripts

      - name: Download APKs via APKCombo
        run: |
          set -euo pipefail
          OUT_DIR="./apks-apkcombo-${{ env.BUILD_DATE }}"
          mkdir -p "$OUT_DIR"
          IFS=';' read -ra PACKAGES <<< "${{ inputs.package_name }}"
          ARCH="${{ inputs.architecture }}"

          cd apkcombo-downloader

          for pkg in "${PACKAGES[@]}"; do
            echo "📦 下载: $pkg → arch=$ARCH"
            bun run src/cli.ts download "$pkg" "" \
              --arch "$ARCH" \
              --outdir "../$OUT_DIR" \
              --overwrite \
              || echo "::warning::❌ $pkg 下载失败，继续下一个"
          done

          cd ..
          echo "✅ 下载完成，文件清单："
          ls -lh "$OUT_DIR"

      - name: Encrypt apks and create release
        uses: ./ci_source/.github/actions/aes256pac_release/
        with:
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          ARTIFACT_DIRECTORY_PATH: "./apks-apkcombo-${{ env.BUILD_DATE }}"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-from-apkcombo"