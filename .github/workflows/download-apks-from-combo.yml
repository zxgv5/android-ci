name: download-apks-from-combo

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "包名（多个包名用英文分号 ; 分隔）"
        required: true
        type: string
        default: "com.cxinventor.file.explorer;org.freedownloadmanager.fdm;com.rhmsoft.edit;com.rhmsoft.code;mark.via.gp;com.flyersoft.moonreader;com.azure.authenticator;org.mozilla.focus;com.mxtech.videoplayer.ad"
      architecture:
        description: "架构（arm64-v8a, armeabi-v7a, x86, x86_64, universal 等）"
        required: false
        default: "arm64-v8a"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: echo "BUILD_DATE=$(TZ=UTC-8 date +'%y.%m.%d-%H.%M.%S')" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: '20'

      - name: Install apkcombo-downloader
        run: |
          npm init -y
          npm install @nirewen/apkcombo-downloader

      - name: Prepare download configuration
        run: |
          set -euo pipefail
          DOWNLOAD_DIR="./apks-combo-${{ env.BUILD_DATE }}"
          mkdir -p "$DOWNLOAD_DIR"
          IFS=';' read -ra packages <<< "${{ inputs.package_name }}"
          echo "{" > apps.json
          echo '  "options": {' >> apps.json
          echo '    "arch": "${{ inputs.architecture }}",' >> apps.json
          echo '    "outDir": "'$DOWNLOAD_DIR'",' >> apps.json
          echo '    "dpi": "nodpi"' >> apps.json
          echo '  },' >> apps.json
          echo '  "apps": [' >> apps.json
          first=true
          for pkg in "${packages[@]}"; do
            pkg_trimmed=$(echo "$pkg" | xargs)
            if [ -n "$pkg_trimmed" ]; then
              IFS='.' read -ra parts <<< "$pkg_trimmed"
              
              # 手动映射 org（请根据实际应用名调整）
              case "$pkg_trimmed" in
                com.cxinventor.file.explorer)
                  org="cx-file-explorer"  # 假设的应用名，请验证
                  ;;
                org.freedownloadmanager.fdm)
                  org="fdm"
                  ;;
                com.rhmsoft.edit)
                  org="edit"
                  ;;
                com.rhmsoft.code)
                  org="code"
                  ;;
                mark.via.gp)
                  org="via-browser"  # 推测，请验证
                  ;;
                com.flyersoft.moonreader)
                  org="moon-reader"
                  ;;
                com.azure.authenticator)
                  org="microsoft-authenticator"  # 推测，请验证
                  ;;
                org.mozilla.focus)
                  org="firefox-focus"
                  ;;
                com.mxtech.videoplayer.ad)
                  org="mx-player"
                  ;;
                *)
                  # 默认规则：取包名最后一段（可能不准确）
                  org="${parts[-1]}"
                  ;;
              esac
              
              repo="$pkg_trimmed"
              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> apps.json
              fi
              echo '    {' >> apps.json
              echo '      "org": "'$org'",' >> apps.json
              echo '      "repo": "'$repo'",' >> apps.json
              echo '      "outFile": "'$pkg_trimmed'"' >> apps.json
              echo '    }' >> apps.json
            fi
          done
          echo '  ]' >> apps.json
          echo "}" >> apps.json
          cat apps.json

      - name: Install axios and cheerio
        run: npm install axios cheerio
      
      - name: Download apks using custom script
        run: |
          set -euo pipefail
          cat > download-custom.js << 'EOF'
          const fs = require('fs');
          const axios = require('axios');
          const cheerio = require('cheerio');
          const config = JSON.parse(fs.readFileSync('apps.json', 'utf8'));
          const { options, apps } = config;
          const failedApps = [];
          async function downloadFile(url, dest) {
            const writer = fs.createWriteStream(dest);
            const response = await axios({
              method: 'get',
              url: url,
              responseType: 'stream',
              headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36' }
            });
            response.data.pipe(writer);
            return new Promise((resolve, reject) => {
              writer.on('finish', resolve);
              writer.on('error', reject);
            });
          }
      
          (async () => {
            for (const app of apps) {
              console.log(`\n▶️ 正在处理：${app.org}/${app.repo}`);
              const versionPageUrl = `https://apkcombo.app/${app.org}/${app.repo}/`;
              console.log(`📄 版本页面 URL: ${versionPageUrl}`);
              try {
                // 获取版本页面 HTML
                const { data: html } = await axios.get(versionPageUrl, {
                  headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36' }
                });
                const $ = cheerio.load(html);
      
                // 查找最新稳定版本的链接（根据实际页面结构调整选择器）
                // 假设版本列表在 class="versions-list" 中，每个版本项包含 <a> 链接
                const versionLink = $('a.version-link').first().attr('href'); // 需要根据实际页面调整
                if (!versionLink) {
                  throw new Error('未找到任何版本');
                }
                const versionUrl = new URL(versionLink, versionPageUrl).href;
                console.log(`📦 版本详情页: ${versionUrl}`);
                // 获取版本详情页（变体选择页）
                const { data: versionHtml } = await axios.get(versionUrl, {
                  headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36' }
                });
                const $v = cheerio.load(versionHtml);
                // 查找下载链接（根据架构筛选）
                // 通常每个变体会有一个下载按钮，例如 <a class="download-btn" href="...">
                // 我们优先选择符合指定架构的变体
                let downloadLink = null;
                const arch = options.arch || 'universal';
                $v('a.download-btn').each((i, el) => {
                  const text = $v(el).text().toLowerCase();
                  if (text.includes(arch) || text.includes('universal')) {
                    downloadLink = $v(el).attr('href');
                    return false; // 找到后停止
                  }
                });
                // 如果没找到指定架构，取第一个下载按钮
                if (!downloadLink) {
                  downloadLink = $v('a.download-btn').first().attr('href');
                }
                if (!downloadLink) {
                  // 有些页面的下载按钮可能不是直接链接，而是通过 onclick 跳转
                  // 可尝试提取 data-url 或类似属性
                  downloadLink = $v('[data-url]').first().attr('data-url');
                }
                if (!downloadLink) {
                  throw new Error('未找到下载链接');
                }
                const downloadUrl = new URL(downloadLink, versionUrl).href;
                console.log(`⬇️ 下载 URL: ${downloadUrl}`);
                // 确定输出文件名
                const outFile = app.outFile || `${app.repo}.apk`;
                const dest = `${options.outDir}/${outFile}`;
                await downloadFile(downloadUrl, dest);
                console.log(`✅ 下载成功：${outFile}`);
              } catch (err) {
                console.error(`❌ 下载失败：${app.org}/${app.repo} - ${err.message}`);
                failedApps.push(app);
              }
            }
            if (failedApps.length > 0) {
              console.error('\n❌ 以下应用下载失败：');
              failedApps.forEach(app => console.error(`- ${app.org}/${app.repo}`));
              process.exit(1);
            }
          })().catch(err => {
            console.error('脚本执行出错：', err);
            process.exit(1);
          });
          EOF
          node download-custom.js
          echo "下载完成，文件清单："
          ls -lh "./apks-combo-${{ env.BUILD_DATE }}/"

      - name: Encrypt apks and create release
        uses: ./ci_source/.github/actions/aes256pac_release/
        with:
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          ARTIFACT_DIRECTORY_PATH: "./apks-combo-${{ env.BUILD_DATE }}"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-from-combo"