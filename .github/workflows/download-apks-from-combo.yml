name: download-apks-from-mirror

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "包名（多个用分号分隔）"
        required: true
        default: "com.cxinventor.file.explorer;dev.vodik7.atvtools"
        type: string
      architecture:
        description: "架构（arm64-v8a, armeabi-v7a, universal 等）"
        required: false
        default: "arm64-v8a"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: '20'

      # ======================================================================
      # 使用 apkmirror-downloader 下载 APK（兼容 apkcombo-downloader）
      # 说明：apkcombo-downloader (https://github.com/nirewen/apkcombo-downloader)
      # fork 自 apkmirror-downloader，并修改下载源为 APKCombo。
      # 由于前者未发布到 npm 且模块入口不完善，此处直接使用上游已发布的
      # apkmirror-downloader 包，其 API 与 apkcombo-downloader 完全一致。
      # 如需切换到 APKCombo 源，可考虑后续修改下载器的请求基地址。
      # ======================================================================
      - name: Install apkmirror-downloader
        run: npm install -g apkmirror-downloader

      - name: Create directory and download apks
        run: |
          set -euo pipefail
          OUT_DIR="./apks-apkmirror-${{ env.BUILD_DATE }}"
          mkdir -p "$OUT_DIR"
          IFS=';' read -ra PACKAGES <<< "${{ inputs.package_name }}"
          ARCH="${{ inputs.architecture }}"

          # 创建 Node.js 下载脚本
          cat > download.js << 'EOF'
          const { APKMirrorDownloader } = require('apkmirror-downloader');

          async function downloadPackage(pkg, arch, outDir) {
            const parts = pkg.split('.');
            const repo = parts.pop();
            const org = parts.join('-');
            console.log(`[${pkg}] 推导 org=${org}, repo=${repo}, arch=${arch}`);

            const downloader = new APKMirrorDownloader({ outDir });
            try {
              await downloader.download({ org, repo }, { arch });
              console.log(`[${pkg}] ✅ 下载成功`);
              return true;
            } catch (err) {
              console.error(`[${pkg}] ❌ 下载失败: ${err.message}`);
              return false;
            }
          }

          async function main() {
            const packagesArg = process.argv[2];
            const arch = process.argv[3];
            const outDir = process.argv[4];
            if (!packagesArg || !arch || !outDir) {
              console.error('用法: node download.js "pkg1;pkg2" arch outDir');
              process.exit(1);
            }
            const packages = packagesArg.split(';').map(p => p.trim()).filter(p => p);
            let allSuccess = true;
            for (const pkg of packages) {
              const success = await downloadPackage(pkg, arch, outDir);
              if (!success) allSuccess = false;
            }
            if (!allSuccess) {
              console.error('部分应用下载失败，请检查日志');
              process.exit(1);
            }
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

          node download.js "${{ inputs.package_name }}" "$ARCH" "$OUT_DIR"

          echo "下载完成，文件清单："
          ls -lh "$OUT_DIR"

      - name: Encrypt apks and create release
        uses: ./ci_source/.github/actions/aes256pac_release/
        with:
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          ARTIFACT_DIRECTORY_PATH: "./apks-apkmirror-${{ env.BUILD_DATE }}"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-from-apkmirror"