name: download-apks-from-mirror

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "包名（多个用分号分隔）"
        required: true
        default: "com.cxinventor.file.explorer;dev.vodik7.atvtools"
        type: string
      architecture:
        description: "架构（arm64-v8a, armeabi-v7a, universal 等）"
        required: false
        default: "arm64-v8a"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Download APKs from APKCombo
        run: |
          set -euo pipefail
          OUT_DIR="./apks-apkcombo-${{ env.BUILD_DATE }}"
          mkdir -p "$OUT_DIR"
          PACKAGES_STR="${{ inputs.package_name }}"
          ARCH="${{ inputs.architecture }}"

          cat > download.js << 'EOF'
          const axios = require('axios');
          const cheerio = require('cheerio');
          const fs = require('fs');
          const path = require('path');
          const { promisify } = require('util');
          const stream = require('stream');
          const finished = promisify(stream.finished);

          // APKCombo 下载页面 URL 直接使用完整包名
          const BASE_URL = 'https://apkcombo.com';

          // 架构映射（APKCombo 页面上的选择项文本）
          const ARCH_MAP = {
            'arm64-v8a': 'arm64-v8a',
            'armeabi-v7a': 'armeabi-v7a',
            'universal': 'universal',
            'x86': 'x86',
            'x86_64': 'x86_64'
          };

          async function downloadFile(url, destPath) {
            const writer = fs.createWriteStream(destPath);
            const response = await axios({
              method: 'get',
              url: url,
              responseType: 'stream',
              headers: {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8',
                'Accept-Language': 'en-US,en;q=0.5',
                'Referer': BASE_URL
              }
            });
            response.data.pipe(writer);
            await finished(writer);
          }

          async function downloadPackage(pkg, arch, outDir) {
            console.log(`[${pkg}] 开始处理，架构: ${arch}`);
            
            // 1. 访问应用主页
            const appUrl = `${BASE_URL}/${pkg}`;
            console.log(`[${pkg}] 访问主页: ${appUrl}`);
            let response;
            try {
              response = await axios.get(appUrl, {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8'
                }
              });
            } catch (err) {
              console.error(`[${pkg}] ❌ 访问主页失败: ${err.message}`);
              return false;
            }

            const $ = cheerio.load(response.data);
            
            // 2. 查找下载链接（通常页面上的 "Download APK" 按钮）
            let downloadPageUrl = null;
            $('a').each((i, el) => {
              const href = $(el).attr('href');
              const text = $(el).text().toLowerCase();
              if (href && (text.includes('download apk') || href.includes('/download/'))) {
                downloadPageUrl = href.startsWith('http') ? href : `${BASE_URL}${href}`;
                return false;
              }
            });

            if (!downloadPageUrl) {
              console.error(`[${pkg}] ❌ 未找到下载按钮`);
              return false;
            }

            console.log(`[${pkg}] 下载页面: ${downloadPageUrl}`);

            // 3. 进入下载页面，获取具体 APK 下载链接（含架构选择）
            let downloadResp;
            try {
              downloadResp = await axios.get(downloadPageUrl, {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8'
                }
              });
            } catch (err) {
              console.error(`[${pkg}] ❌ 访问下载页面失败: ${err.message}`);
              return false;
            }

            const $download = cheerio.load(downloadResp.data);

            // 4. 尝试选择指定架构的 APK 链接
            let apkUrl = null;
            
            // 优先查找带有架构标记的链接
            $download('a').each((i, el) => {
              const href = $(el).attr('href');
              const text = $(el).text().toLowerCase();
              if (href && href.endsWith('.apk')) {
                // 检查文本是否包含目标架构
                if (text.includes(arch.toLowerCase())) {
                  apkUrl = href;
                  return false;
                }
                // 如果没找到匹配架构，暂存第一个 .apk 链接作为备选
                if (!apkUrl) apkUrl = href;
              }
            });

            // 如果仍没找到，尝试解析页面上的 data 属性（某些站点动态加载）
            if (!apkUrl) {
              const scriptContent = $download('script').html() || '';
              const apkMatch = scriptContent.match(/(https?:\/\/[^\s"']+\.apk[^\s"']*)/i);
              if (apkMatch) apkUrl = apkMatch[1];
            }

            if (!apkUrl) {
              console.error(`[${pkg}] ❌ 未找到 APK 下载链接`);
              return false;
            }

            // 确保 URL 完整
            if (!apkUrl.startsWith('http')) {
              apkUrl = `${BASE_URL}${apkUrl}`;
            }

            console.log(`[${pkg}] APK 下载链接: ${apkUrl}`);

            // 5. 下载 APK 文件
            const fileName = `${pkg}_${arch}_${Date.now()}.apk`;
            const filePath = path.join(outDir, fileName);
            
            try {
              console.log(`[${pkg}] 开始下载...`);
              await downloadFile(apkUrl, filePath);
              console.log(`[${pkg}] ✅ 下载成功: ${fileName}`);
              return true;
            } catch (err) {
              console.error(`[${pkg}] ❌ 下载失败: ${err.message}`);
              return false;
            }
          }

          async function main() {
            const packagesArg = process.argv[2];
            const arch = process.argv[3];
            const outDir = process.argv[4];
            
            if (!packagesArg || !arch || !outDir) {
              console.error('用法: node download.js "pkg1;pkg2" arch outDir');
              process.exit(1);
            }

            const packages = packagesArg.split(';').map(p => p.trim()).filter(p => p);
            let allSuccess = true;
            
            for (const pkg of packages) {
              const success = await downloadPackage(pkg, arch, outDir);
              if (!success) allSuccess = false;
            }

            if (!allSuccess) {
              console.error('部分应用下载失败，请检查日志');
              process.exit(1);
            }
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

          node download.js "$PACKAGES_STR" "$ARCH" "$OUT_DIR"
          echo "下载完成，文件清单："
          ls -lh "$OUT_DIR"

      - name: Encrypt apks and create release
        uses: ./ci_source/.github/actions/aes256pac_release/
        with:
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          ARTIFACT_DIRECTORY_PATH: "./apks-apkcombo-${{ env.BUILD_DATE }}"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-from-apkcombo"