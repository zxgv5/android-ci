name: download-apks-from-mirror

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "包名（多个用分号分隔）"
        required: true
        default: "com.cxinventor.file.explorer;dev.vodik7.atvtools"
        type: string
      architecture:
        description: "架构（arm64-v8a, armeabi-v7a, universal 等）"
        required: false
        default: "arm64-v8a"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.21

      - name: Clone apkmirror-downloader
        run: git clone https://github.com/tanishqmanuja/apkmirror-downloader.git

      - name: Patch fetch with full browser headers
        run: |
          cd apkmirror-downloader

          cat > patch.js << 'PATCH'
          const fs = require('fs');
          const path = require('path');

          const fetchOptions = `{ 
            headers: {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8',
              'Accept-Language': 'en-US,en;q=0.9',
              'Cache-Control': 'no-cache',
              'Pragma': 'no-cache',
              'Sec-Ch-Ua': '"Not_A Brand";v="8", "Chromium";v="120", "Google Chrome";v="120"',
              'Sec-Ch-Ua-Mobile': '?0',
              'Sec-Ch-Ua-Platform': '"Windows"',
              'Sec-Fetch-Dest': 'document',
              'Sec-Fetch-Mode': 'navigate',
              'Sec-Fetch-Site': 'none',
              'Sec-Fetch-User': '?1',
              'Upgrade-Insecure-Requests': '1',
              'Cookie': 'CONSENT=YES+; _ga=GA1.2.1234567890.1234567890'
            },
            credentials: 'include',
            referrerPolicy: 'strict-origin-when-cross-origin',
            mode: 'cors'
          }`.replace(/\n\s*/g, ' ');

          const versionsPath = path.join('src', 'lib', 'scrapers', 'versions.ts');
          let versionsContent = fs.readFileSync(versionsPath, 'utf8');
          versionsContent = versionsContent.replace(
            /fetch\(repoPageUrl\)/g,
            `fetch(repoPageUrl, ${fetchOptions})`
          );
          fs.writeFileSync(versionsPath, versionsContent);
          console.log('✅ Patched versions.ts');

          const downloadsPath = path.join('src', 'lib', 'scrapers', 'downloads.ts');
          let downloadsContent = fs.readFileSync(downloadsPath, 'utf8');
          downloadsContent = downloadsContent.replace(
            /fetch\(downloadPageUrl\)/g,
            `fetch(downloadPageUrl, ${fetchOptions})`
          );
          downloadsContent = downloadsContent.replace(
            /fetch\(url\)/g,
            `fetch(url, ${fetchOptions})`
          );
          fs.writeFileSync(downloadsPath, downloadsContent);
          console.log('✅ Patched downloads.ts');
          PATCH

          bun patch.js

      - name: Install dependencies
        run: |
          cd apkmirror-downloader
          bun install --ignore-scripts

      - name: Download APKs
        run: |
          set -euo pipefail
          OUT_DIR="./apks-apkmirror-${{ env.BUILD_DATE }}"
          mkdir -p "$OUT_DIR"
          IFS=';' read -ra PACKAGES <<< "${{ inputs.package_name }}"
          ARCH="${{ inputs.architecture }}"

          cd apkmirror-downloader

          for pkg in "${PACKAGES[@]}"; do
            org=$(echo "$pkg" | awk -F. '{OFS="-"; $NF=""; sub(/-$/,""); print}')
            repo=$(echo "$pkg" | awk -F. '{print $NF}')
            echo "📦 下载: $pkg → org=$org repo=$repo arch=$ARCH"
            bun run src/cli.ts download "$org" "$repo" \
              --arch "$ARCH" \
              --outdir "../$OUT_DIR" \
              --overwrite \
              || echo "::warning::❌ $pkg 下载失败，继续下一个"
          done

          cd ..
          echo "✅ 下载完成，文件清单："
          ls -lh "$OUT_DIR"

      - name: Encrypt apks and create release
        uses: ./ci_source/.github/actions/aes256pac_release/
        with:
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          ARTIFACT_DIRECTORY_PATH: "./apks-apkmirror-${{ env.BUILD_DATE }}"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-from-apkmirror"