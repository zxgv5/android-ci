name: download-apks-from-mirror

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "包名（多个用分号分隔）"
        required: true
        default: "com.cxinventor.file.explorer;dev.vodik7.atvtools"
        type: string
      architecture:
        description: "架构（arm64-v8a, armeabi-v7a, universal 等）"
        required: false
        default: "arm64-v8a"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: '20'

      # ----------------------------------------------------------------------
      # 克隆 apkcombo-downloader 源码并安装依赖
      # ----------------------------------------------------------------------
      - name: Clone apkcombo-downloader source
        run: |
          git clone https://github.com/nirewen/apkcombo-downloader.git
          cd apkcombo-downloader
          npm install

      # ----------------------------------------------------------------------
      # 调试：打印目录结构及 package.json 关键信息
      # ----------------------------------------------------------------------
      - name: Inspect apkcombo-downloader structure
        run: |
          echo "=== 工作目录 ==="
          pwd
          echo "=== apkcombo-downloader 目录列表 ==="
          ls -la apkcombo-downloader/
          echo "=== src 目录内容 ==="
          ls -la apkcombo-downloader/src/ || echo "src 目录不存在"
          echo "=== package.json 中的入口字段 ==="
          cat apkcombo-downloader/package.json | grep -E '"main"|"exports"|"bin"' || echo "未定义 main/exports/bin"

      # ----------------------------------------------------------------------
      # 创建下载脚本（根据实际入口动态 require）
      # ----------------------------------------------------------------------
      - name: Create download script
        run: |
          cat > download.js << 'EOF'
          const fs = require('fs');
          const path = require('path');

          // 读取 package.json 确定入口文件
          const pkgJsonPath = path.join(__dirname, 'apkcombo-downloader', 'package.json');
          const pkgJson = JSON.parse(fs.readFileSync(pkgJsonPath, 'utf8'));
          const mainFile = pkgJson.main || 'index.js';
          const entryPath = path.join(__dirname, 'apkcombo-downloader', mainFile);
          console.log(`使用入口文件: ${entryPath}`);

          const { APKComboDownloader } = require(entryPath);

          async function downloadPackage(pkg, arch, outDir) {
            const parts = pkg.split('.');
            const repo = parts.pop();
            const org = parts.join('-');
            console.log(`[${pkg}] 推导 org=${org}, repo=${repo}, arch=${arch}`);

            const downloader = new APKComboDownloader({ outDir });
            try {
              await downloader.download({ org, repo }, { arch });
              console.log(`[${pkg}] ✅ 下载成功`);
              return true;
            } catch (err) {
              console.error(`[${pkg}] ❌ 下载失败: ${err.message}`);
              return false;
            }
          }

          async function main() {
            const packagesArg = process.argv[2];
            const arch = process.argv[3];
            const outDir = process.argv[4];
            if (!packagesArg || !arch || !outDir) {
              console.error('用法: node download.js "pkg1;pkg2" arch outDir');
              process.exit(1);
            }
            const packages = packagesArg.split(';').map(p => p.trim()).filter(p => p);
            let allSuccess = true;
            for (const pkg of packages) {
              const success = await downloadPackage(pkg, arch, outDir);
              if (!success) allSuccess = false;
            }
            if (!allSuccess) {
              console.error('部分应用下载失败，请检查日志');
              process.exit(1);
            }
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Download APKs using apkcombo-downloader
        run: |
          set -euo pipefail
          OUT_DIR="./apks-apkcombo-${{ env.BUILD_DATE }}"
          mkdir -p "$OUT_DIR"
          node download.js "${{ inputs.package_name }}" "${{ inputs.architecture }}" "$OUT_DIR"
          echo "下载完成，文件清单："
          ls -lh "$OUT_DIR"

      - name: Encrypt apks and create release
        uses: ./ci_source/.github/actions/aes256pac_release/
        with:
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          ARTIFACT_DIRECTORY_PATH: "./apks-apkcombo-${{ env.BUILD_DATE }}"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-from-apkcombo"