name: build-apk-lightninglauncher

on:
  workflow_dispatch:
  workflow_call:

env:
  JDK_VERSION: '21'
  JDK_DISTRIBUTION: 'temurin'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clean runner environment
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          rm -rf ~/.android/build-cache/
          rm -rf .gradle

      - name: Checkout source repo
        uses: actions/checkout@main
        with:
          repository: threethan/LightningLauncher
          ref: main
          path: lightninglauncher_source
          fetch-depth: 0
          submodules: recursive

      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup java
        uses: actions/setup-java@main
        with:
          java-version: "${{ env.JDK_VERSION }}"
          distribution: "${{ env.JDK_DISTRIBUTION }}"

      - name: Decode keystore and create init script
        working-directory: ./lightninglauncher_source/Launcher
        run: |
          mkdir -p App
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > App/keystore.p12
          cat > init.gradle << EOF
          allprojects {
              afterEvaluate { project ->
                  if (project.plugins.hasPlugin('com.android.application')) {
                      if (!project.android.signingConfigs.hasProperty('release')) {
                          project.android.signingConfigs.create('release')
                      }
                      def releaseConfig = project.android.signingConfigs.getByName('release')
                      releaseConfig.storeFile = project.rootProject.file('App/keystore.p12')
                      releaseConfig.storePassword = System.getenv('KEYSTORE_PASSWORD')
                      releaseConfig.keyAlias = System.getenv('KEY_ALIAS')
                      releaseConfig.keyPassword = System.getenv('KEYSTORE_PASSWORD')
                      releaseConfig.storeType = 'PKCS12'
                      releaseConfig.enableV1Signing = true
                      releaseConfig.enableV2Signing = true
                      releaseConfig.enableV3Signing = true
                      project.android.buildTypes.release.signingConfig = releaseConfig
                  }
              }
          }
          EOF

      # 临时修复：创建缺失的 drawable 资源文件（占位）
      - name: Create missing drawable resources
        working-directory: ./lightninglauncher_source/Launcher/App/src/main/res
        run: |
          mkdir -p drawable
          cd drawable
          for name in ai_google ai_youtube ai_apkmirror ai_playstore; do
            echo '<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
            <path
                android:fillColor="#FF000000"
                android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2z"/>
          </vector>' > $name.xml
          done

      # 去除设置页面顶部花里胡哨的内容
      - name: Patch flipper code
        working-directory: ./lightninglauncher_source/Launcher/App/src/main
        run: |
          # 1. 为 dialog_settings.xml 中的 flipper include 添加 id
          sed -i 's|<include layout="@layout/flipper"|<include android:id="@+id/flipper" layout="@layout/flipper"|' res/layout/dialog_settings.xml
          # 2. 在 SettingsDialog.java 的 show() 方法中隐藏 flipper
          sed -i '/AlertDialog dialog = super\.show();/a \        dialog.findViewById(R.id.flipper).setVisibility(View.GONE);' java/com/threethan/launcher/activity/dialog/SettingsDialog.java

      - name: Clean project to regenerate R
        working-directory: ./lightninglauncher_source/Launcher
        run: |
          ./gradlew clean

      - name: Build signed apk with init script
        working-directory: ./lightninglauncher_source/Launcher
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          chmod +x ./gradlew
          # 构建默认的 sideload flavor
          ./gradlew assembleSideloadRelease --no-daemon -I init.gradle

      - name: List generated apk files
        working-directory: ./lightninglauncher_source/Launcher
        run: |
          echo "Listing all apk files generated:"
          find App/build/outputs -type f -name "*.apk" | sort

      - name: Rename and move
        working-directory: ./lightninglauncher_source/Launcher
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          mv "./App/build/outputs/apk/sideload/release/App-sideload-release.apk" "${{ github.workspace }}/dist/lightninglauncher-${{ env.BUILD_DATE }}.apk"

      - name: Erase keystore, encrypt package and create release
        uses: ./ci_source/.github/actions/erase_aes256pac_release/
        with:
          P12_KEYSTORE_PATH: "./lightninglauncher_source/Launcher/App/keystore.p12"
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          BUILD_ARTIFACT_PATH: "./dist/lightninglauncher-${{ env.BUILD_DATE }}.apk"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-lightninglauncher"