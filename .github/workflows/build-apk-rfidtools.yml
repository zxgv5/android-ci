name: build-apk-rfidtools

on:
  workflow_dispatch:
  workflow_call:

env:
  JDK_VERSION: '17'
  JDK_DISTRIBUTION: 'temurin'
  ANDROID_COMPILE_SDK: '33'
  ANDROID_BUILD_TOOLS: '33.0.0'
  ANDROID_NDK_VERSION: '20.0.5594570'
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clean runner environment
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          rm -rf ~/.android/build-cache/
          rm -rf .gradle

      - name: Checkout source repo
        uses: actions/checkout@main
        with:
          repository: RfidResearchGroup/RFIDtools
          ref: master
          path: rfidtools_source
          fetch-depth: 0
          submodules: recursive

      - name: Checkout ci source repo (self)
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Initialization values
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup java
        uses: actions/setup-java@main
        with:
          distribution: '${{ env.JDK_DISTRIBUTION }}'
          java-version: '${{ env.JDK_VERSION }}'

      - name: Install android ndk
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Write keystore info and configure signing
        working-directory: ./rfidtools_source
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/rfidtools_source/keystore.p12
          # 确保 gradle.properties 格式正确
          if [ -f "gradle.properties" ]; then
              if [ -s "gradle.properties" ] && [ "$(tail -c1 gradle.properties | wc -l)" -eq 0 ]; then
                  echo "" >> gradle.properties
              fi
          fi
          {
            echo "KEYSTORE_FILE=${{ github.workspace }}/rfidtools_source/keystore.p12"
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"
            echo "KEY_ALIAS_PASSWORD=${{ secrets.KEY_ALIAS_PASSWORD }}"
          } >> gradle.properties
          awk 'match($0, /^[ \t]*/) {lead=substr($0, RSTART, RLENGTH)} /android {/ {print; print lead "    signingConfigs {"; print lead "        release {"; print lead "            storeFile file(project.property(\"KEYSTORE_FILE\"))"; print lead "            storePassword project.property(\"KEYSTORE_PASSWORD\")"; print lead "            keyAlias project.property(\"KEY_ALIAS\")"; print lead "            keyPassword project.property(\"KEY_ALIAS_PASSWORD\")"; print lead "        }"; print lead "    }"; next}1' apprts/build.gradle > apprts/build.gradle.tmp && mv apprts/build.gradle.tmp apprts/build.gradle
          awk 'match($0, /^[ \t]*/) {lead=substr($0, RSTART, RLENGTH)} /release {/ {print; print lead "        signingConfig signingConfigs.release"; next}1' apprts/build.gradle > apprts/build.gradle.tmp && mv apprts/build.gradle.tmp apprts/build.gradle

      - name: Fix gradle jvmargs for java 17
        working-directory: ./rfidtools_source
        run: |
          # 移除 Java 17 不支持的 -XX:MaxPermSize
          sed -i 's/ -XX:MaxPermSize=[^ ]*//g' gradle.properties
          sed -i 's/^-XX:MaxPermSize=[^ ]* //g' gradle.properties
          sed -i 's/^-XX:MaxPermSize=[^ ]*$//g' gradle.properties

      - name: Configure build for arm64-v8a only
        working-directory: ./rfidtools_source
        run: |
          # 使用 awk 在 defaultConfig 块内插入 ndk 配置
          awk 'match($0, /^[ \t]*/) {lead=substr($0, RSTART, RLENGTH)} /defaultConfig {/ {print; print lead "    ndk {"; print lead "        abiFilters \"arm64-v8a\""; print lead "    }"; next}1' apprts/build.gradle > apprts/build.gradle.tmp && mv apprts/build.gradle.tmp apprts/build.gradle

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@main
        with:
          dependency-graph: generate-and-submit
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Build with gradle
        working-directory: ./rfidtools_source
        run: |
          chmod +x ./gradlew
          ./gradlew :apprts:assembleRelease

      - name: List generated apk files
        working-directory: ./rfidtools_source
        run: |
          echo "Listing all apk files generated:"
          find apprts/build/outputs -name "*.apk" | sort

      - name: Rename and move apk
        working-directory: ./rfidtools_source
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          apkPath="apprts/build/outputs/apk/release/apprts-release.apk"
          if [ ! -f "$apkPath" ]; then
            echo "APK not found at $apkPath"
            exit 1
          fi
          mv "$apkPath" "${{ github.workspace }}/dist/rfidtools-${{ env.BUILD_DATE }}.apk"

      - name: Erase keystore, encrypt package and create release
        uses: ./ci_source/.github/actions/erase_aes256pac_release/
        with:
          P12_KEYSTORE_PATH: "./rfidtools_source/keystore.p12"
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          BUILD_ARTIFACT_PATH: "./dist/rfidtools-${{ env.BUILD_DATE }}.apk"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-rfidtools"