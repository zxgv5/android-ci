name: build-apk-paridroid

on:
  workflow_dispatch:
  workflow_call:

env:
  JDK_VERSION: '17'
  JDK_DISTRIBUTION: 'temurin'
  ANDROID_COMPILE_SDK: '30'
  ANDROID_BUILD_TOOLS: '30.0.3'
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clean runner environment
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          rm -rf ~/.android/build-cache/
          rm -rf .gradle

      - name: Checkout source repo
        run: |
          git clone --branch master https://pari.math.u-bordeaux.fr/git/paridroid.git paridroid_source
          cd paridroid_source
          git submodule update --init --recursive

      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup java
        uses: actions/setup-java@main
        with:
          distribution: '${{ env.JDK_DISTRIBUTION }}'
          java-version: '${{ env.JDK_VERSION }}'

      - name: Decode keystore and create init script
        working-directory: ./paridroid_source/PariDroid
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.p12
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_ALIAS_PASSWORD=${{ secrets.KEY_ALIAS_PASSWORD }}" >> $GITHUB_ENV
          cat > init.gradle << 'EOF'
          allprojects {
              afterEvaluate { project ->
                  if (project.plugins.hasPlugin('com.android.application')) {
                      if (!project.android.signingConfigs.hasProperty('release')) {
                          project.android.signingConfigs.create('release')
                      }
                      def releaseConfig = project.android.signingConfigs.getByName('release')
                      releaseConfig.storeFile = project.rootProject.file('app/keystore.p12')
                      releaseConfig.storePassword = System.getenv('KEYSTORE_PASSWORD')
                      releaseConfig.keyAlias = System.getenv('KEY_ALIAS')
                      releaseConfig.keyPassword = System.getenv('KEY_ALIAS_PASSWORD')
                      releaseConfig.storeType = 'PKCS12'
                      releaseConfig.enableV1Signing = true
                      releaseConfig.enableV2Signing = true
                      releaseConfig.enableV3Signing = true
                      project.android.buildTypes.release.signingConfig = releaseConfig
                  }
              }
          }
          EOF

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@main
        with:
          gradle-version: '7.4'
          dependency-graph: generate-and-submit
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Build with gradle
        working-directory: ./paridroid_source/PariDroid
        run: |
          echo "" >> gradle.properties
          echo 'org.gradle.caching=true' >> gradle.properties
          echo 'org.gradle.parallel=true' >> gradle.properties
          chmod +x ./gradlew
          ./gradlew assembleRelease -Pandroid.abis=arm64-v8a -I init.gradle

      - name: List generated apk files
        working-directory: ./paridroid_source/PariDroid
        run: |
          echo "Listing all apk files generated:"
          find app/build/outputs -name "*.apk" | sort

      - name: Rename and move
        working-directory: ./paridroid_source/PariDroid
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          mv "./app/build/outputs/apk/release/app-release.apk" "${{ github.workspace }}/dist/paridroid-${{ env.BUILD_DATE }}.apk"

      - name: Erase keystore, encrypt package and create release
        uses: ./ci_source/.github/actions/erase_aes256pac_release/
        with:
          P12_KEYSTORE_PATH: "./paridroid_source/PariDroid/app/keystore.p12"
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          BUILD_ARTIFACT_PATH: "./dist/paridroid-${{ env.BUILD_DATE }}.apk"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-paridroid"