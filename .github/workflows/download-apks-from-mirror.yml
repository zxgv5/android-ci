name: download-apks-from-mirror

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "包名"
        required: true
        type: string
        default: "com.cxinventor.file.explorer;org.freedownloadmanager.fdm;com.rhmsoft.edit;com.rhmsoft.code;mark.via.gp;com.flyersoft.moonreader;com.azure.authenticator;org.mozilla.focus;com.mxtech.videoplayer.ad"
      architecture:
        description: "架构(universal等)"
        required: false
        default: "arm64-v8a"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: '20'

      - name: Install apkmirror-downloader
        run: npm install -g apkmirror-downloader

      - name: Generate timestamp
        run: echo "BUILD_DATE=$(TZ=UTC-8 date +'%y.%m.%d-%H.%M.%S')" >> $GITHUB_ENV

      - name: Prepare download configuration
        run: |
          set -euo pipefail
          # 创建下载目录
          DOWNLOAD_DIR="./apks-mirror-${{ env.BUILD_DATE }}"
          mkdir -p "$DOWNLOAD_DIR"
          # 解析输入的包名，生成 apps.json
          IFS=';' read -ra packages <<< "${{ inputs.package_name }}"
          # 开始构建 JSON 内容
          echo "{" > apps.json
          echo '  "options": {' >> apps.json
          echo '    "arch": "${{ inputs.architecture }}",' >> apps.json
          echo '    "outDir": "'$DOWNLOAD_DIR'"' >> apps.json
          echo '  },' >> apps.json
          echo '  "apps": [' >> apps.json
          first=true
          for pkg in "${packages[@]}"; do
            pkg_trimmed=$(echo "$pkg" | xargs)
            if [ -n "$pkg_trimmed" ]; then
              # 将包名（如 com.google.android.youtube）拆分为 org 和 repo
              IFS='.' read -ra parts <<< "$pkg_trimmed"
              org="${parts[1]}-inc"  # 转换为 APKMirror 格式，例如 google-inc
              repo="${parts[-1]}"      # 取最后一部分作为仓库名
              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> apps.json
              fi  
              echo '    {' >> apps.json
              echo '      "org": "'$org'",' >> apps.json
              echo '      "repo": "'$repo'",' >> apps.json
              echo '      "outFile": "'$pkg_trimmed'"' >> apps.json
              echo '    }' >> apps.json
            fi
          done
          echo '  ]' >> apps.json
          echo "}" >> apps.json
          echo "生成的配置文件内容："
          cat apps.json

      - name: Download apks
        run: |
          set -euo pipefail
          apkmd apps.json
          echo "下载完成，文件清单："
          ls -lh "./apks-mirror-${{ env.BUILD_DATE }}/"

      - name: Encrypt apks and create release
        uses: ./ci_source/.github/actions/aes256pac_release/
        with:
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          ARTIFACT_DIRECTORY_PATH: "./apks-mirror-${{ env.BUILD_DATE }}"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-from-mirror"