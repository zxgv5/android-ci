name: build-apk-localsend

on:
  workflow_dispatch:
  workflow_call:

env:
  JDK_VERSION: '21'
  JDK_DISTRIBUTION: 'temurin'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Clean runner environment
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          rm -rf ~/.android/build-cache/
          rm -rf .gradle

      - name: Checkout source repo
        uses: actions/checkout@main
        with:
          repository: localsend/localsend
          ref: main
          path: localsend_source
          fetch-depth: 0
          submodules: recursive

      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup java
        uses: actions/setup-java@main
        with:
          java-version: '${{ env.JDK_VERSION }}'
          distribution: '${{ env.JDK_DISTRIBUTION }}'

      - name: Setup flutter
        uses: subosito/flutter-action@main
        id: flutter-action
        with:
          channel: stable
          cache: true

      - name: Decode and write keys
        working-directory: ./localsend_source/app
        run: |
          if [ ! -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            mkdir -p android/app
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.p12
            echo "storeFile=android/app/keystore.p12" >> key.properties
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> key.properties
            echo "keyPassword=${{ secrets.KEY_ALIAS_PASSWORD }}" >> key.properties
          fi

      - name: Upgrade dependencies
        working-directory: ./localsend_source/app
        run: flutter pub upgrade

      - name: Flutter build release apk
        working-directory: ./localsend_source/app
        run: |
          flutter build apk --release --flavor normal --target-platform=android-arm64 --split-per-abi

      - name: List generated apk files
        working-directory: ./localsend_source/app
        run: |
          echo "Listing all apk files generated:"
          find ./build/app/outputs -type f -name "*.apk" | sort

      - name: Rename and move
        working-directory: ./localsend_source/app
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          mv "./build/app/outputs/flutter-apk/app-arm64-v8a-normal-release.apk" "${{ github.workspace }}/dist/localsend-${{ env.BUILD_DATE }}.apk"

      - name: Erase keystore, encrypt package and create release
        uses: ./ci_source/.github/actions/erase_aes256pac_release/
        with:
          P12_KEYSTORE_PATH: "./localsend_source/app/android/app/keystore.p12 ./localsend_source/app/key.properties"
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          BUILD_ARTIFACT_PATH: "./dist/localsend-${{ env.BUILD_DATE }}.apk"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-localsend"