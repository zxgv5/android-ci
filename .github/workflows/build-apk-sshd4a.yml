name: build-apk-sshd4a

on:
  workflow_dispatch:
  workflow_call:

env:
  JDK_VERSION: '21'
  JDK_DISTRIBUTION: 'temurin'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clean runner environment
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          rm -rf ~/.android/build-cache/
          rm -rf .gradle

      - name: Checkout source repo
        uses: actions/checkout@main
        with:
          repository: tfonteyn/Sshd4a
          ref: dev
          path: sshd4a_source
          fetch-depth: 0
          submodules: recursive

      - name: Checkout ci source repo (self)
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool

      # 动态生成必要头文件（dropbear 和 rsync）
      - name: Prepare native build (generate required headers)
        working-directory: ./sshd4a_source
        run: |
          # ---------- dropbear ----------
          cd app/src/main/cpp/dropbear
          # 创建 localoptions.h 禁用有问题的特性
          cat > localoptions.h << 'EOF'
          #define DROPBEAR_SVR_PASSWORD_AUTH 0
          #define DROPBEAR_SVR_LOCALSTREAMFWD 0
          #define DROPBEAR_SVR_DROP_PRIVS 0
          EOF
          chmod +x src/ifndef_wrapper.sh
          printf "/**\n > > > Do not edit this file (default_options_guard.h) < < <\nGenerated from src/default_options.h\nLocal customisation goes in localoptions.h\n*/\n\n" > default_options_guard.h.tmp
          ./src/ifndef_wrapper.sh < src/default_options.h >> default_options_guard.h.tmp
          mv -f default_options_guard.h.tmp default_options_guard.h

          # ---------- rsync ----------
          cd ../rsync
          # 给相关脚本添加执行权限
          chmod +x configure packaging/* prepare-source 2>/dev/null || true
          # 运行配置脚本，禁用 ACL、md2man、xxhash 和 openssl 支持
          ./configure --disable-acl --disable-md2man --disable-xxhash --disable-openssl
          # 使用 mkproto.awk 生成 proto.h
          chmod +x mkproto.awk
          awk -f mkproto.awk *.c lib/*.c zlib/*.c popt/*.c > proto.h
          # 清理 proto.h：删除 #include "rsync.h"、版权注释、ACL 声明以及所有 zlib 相关声明
          echo "proto.h content before patch: "
          cat proto.h
          sed -i '/^#include "rsync.h"/d' proto.h
          sed -i '/Copyright/d' proto.h
          sed -i '/Portions/d' proto.h
          sed -i '/SMB_ACL_/d' proto.h
          sed -i '/Permission/d' proto.h
          sed -i '/^uLong/d' proto.h
          sed -i '/^local/d' proto.h
          sed -i '/ZEXPORT/d' proto.h
          sed -i '/compress/d' proto.h
          sed -i '/adler32/d' proto.h
          sed -i '/crc32/d' proto.h
          sed -i '/gf2_matrix/d' proto.h
          echo "proto.h content after patch: "
          cat proto.h


      - name: Initialization values
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup java
        uses: actions/setup-java@main
        with:
          java-version: "${{ env.JDK_VERSION }}"
          distribution: "${{ env.JDK_DISTRIBUTION }}"

      - name: Decode keystore and create init script
        working-directory: ./sshd4a_source
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.p12
          cat > dummy.properties << EOF
          sign.storeFile=dummy
          sign.storePassword=dummy
          sign.keyAlias=dummy
          sign.keyPassword=dummy
          EOF
          cat > init.gradle << 'EOF'
          allprojects {
              afterEvaluate { project ->
                  if (project.plugins.hasPlugin('com.android.application')) {
                      def releaseConfig = project.android.signingConfigs.findByName('release')
                      if (releaseConfig == null) {
                          releaseConfig = project.android.signingConfigs.create('release')
                      }
                      releaseConfig.storeFile = project.rootProject.file('app/keystore.p12')
                      releaseConfig.storePassword = System.getenv('KEYSTORE_PASSWORD')
                      releaseConfig.keyAlias = System.getenv('KEY_ALIAS')
                      releaseConfig.keyPassword = System.getenv('KEY_ALIAS_PASSWORD')
                      releaseConfig.storeType = 'PKCS12'
                      releaseConfig.enableV1Signing = true
                      releaseConfig.enableV2Signing = true
                      releaseConfig.enableV3Signing = true
                      if (project.android.buildTypes.findByName('release') != null) {
                          project.android.buildTypes.release.signingConfig = releaseConfig
                      }
                  }
              }
          }
          EOF

      - name: Build signed apk with init script
        working-directory: ./sshd4a_source
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_ALIAS_PASSWORD: ${{ secrets.KEY_ALIAS_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon -I init.gradle -P Sshd4a.properties=dummy.properties

      - name: List generated apk files
        working-directory: ./sshd4a_source
        run: |
          echo "Listing all apk files generated:"
          find app/build/outputs -type f -name "*.apk" | sort

      - name: Rename and move
        working-directory: ./sshd4a_source
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          APK_PATH=$(find app/build/outputs -type f -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No apk found"
            exit 1
          fi
          mv "$APK_PATH" "${{ github.workspace }}/dist/sshd4a-${{ env.BUILD_DATE }}.apk"

      - name: Erase keystore, encrypt package and create release
        uses: ./ci_source/.github/actions/erase_aes256pac_release/
        with:
          P12_KEYSTORE_PATH: "./sshd4a_source/app/keystore.p12"
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          BUILD_ARTIFACT_PATH: "./dist/sshd4a-${{ env.BUILD_DATE }}.apk"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-sshd4a"