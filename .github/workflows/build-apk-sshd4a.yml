name: build-apk-sshd4a

on:
  workflow_dispatch:
  workflow_call:

env:
  JDK_VERSION: '21'
  JDK_DISTRIBUTION: 'temurin'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clean runner environment
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          rm -rf ~/.android/build-cache/
          rm -rf .gradle

      - name: Checkout source repo
        uses: actions/checkout@main
        with:
          repository: tfonteyn/Sshd4a
          ref: dev
          path: sshd4a_source
          fetch-depth: 0
          submodules: recursive

      - name: Checkout ci source repo (self)
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool wget p7zip-full

      - name: Set up Android NDK environment
        run: |
          ANDROID_TARGET=aarch64-linux-android
          ANDROID_MIN_SDK=30
          ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865
          TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          echo "ANDROID_TARGET=$ANDROID_TARGET" >> $GITHUB_ENV
          echo "ANDROID_MIN_SDK=$ANDROID_MIN_SDK" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "CC=$TOOLCHAIN/bin/${ANDROID_TARGET}${ANDROID_MIN_SDK}-clang" >> $GITHUB_ENV
          echo "AS=$TOOLCHAIN/bin/${ANDROID_TARGET}${ANDROID_MIN_SDK}-clang" >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/bin/${ANDROID_TARGET}${ANDROID_MIN_SDK}-clang++" >> $GITHUB_ENV
          echo "LD=$TOOLCHAIN/bin/ld" >> $GITHUB_ENV
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip" >> $GITHUB_ENV

      - name: Configure dropbear for Android
        working-directory: ./sshd4a_source/app/src/main/cpp/dropbear
        run: |
          chmod +x configure
          ./configure --host $ANDROID_TARGET \
                      --disable-syslog --disable-lastlog \
                      --disable-utmp --disable-wtmp \
                      --enable-bundled-libtom --enable-largefile

      - name: Generate default_options_guard.h for dropbear
        working-directory: ./sshd4a_source/app/src/main/cpp/dropbear
        run: |
          chmod +x src/ifndef_wrapper.sh
          printf "/**\n > > > Do not edit this file (default_options_guard.h) < < <\nGenerated from src/default_options.h\nLocal customisation goes in localoptions.h\n*/\n\n" > default_options_guard.h.tmp
          ./src/ifndef_wrapper.sh < src/default_options.h >> default_options_guard.h.tmp
          mv -f default_options_guard.h.tmp default_options_guard.h

      - name: Configure rsync for Android
        working-directory: ./sshd4a_source/app/src/main/cpp/rsync
        run: |
          chmod +x configure packaging/* prepare-source 2>/dev/null || true
          ./configure --host $ANDROID_TARGET \
                      --disable-acl --disable-md2man --disable-xxhash --disable-openssl \
                      --disable-zstd --disable-lz4 --enable-largefile

      - name: Generate proto.h for rsync
        working-directory: ./sshd4a_source/app/src/main/cpp/rsync
        run: |
          # 首先尝试使用 make proto.h
          if [ -f Makefile ]; then
            echo "Attempting to generate proto.h using make..."
            make proto.h || true
          fi
          if [ ! -f proto.h ] || [ ! -s proto.h ]; then
            echo "make proto.h failed or proto.h is empty, using awk fallback..."
            chmod +x mkproto.awk
            awk -f mkproto.awk *.c lib/*.c zlib/*.c popt/*.c > proto.h.full || { echo "awk failed"; exit 1; }
            if [ ! -s proto.h.full ]; then
              echo "Error: proto.h.full is empty"
              exit 1
            fi
            # 过滤出有效的函数声明
            grep ';$' proto.h.full | grep -v '^#include' | grep -v 'Copyright' | grep -v 'Portions' | grep -v 'SMB_ACL_' > proto.h || true
            if [ ! -s proto.h ]; then
              echo "Warning: filtered proto.h is empty, using original"
              cp proto.h.full proto.h
            fi
            rm -f proto.h.full
          fi
          echo "proto.h generated, lines: $(wc -l < proto.h)"

      - name: Initialization values
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup java
        uses: actions/setup-java@main
        with:
          java-version: "${{ env.JDK_VERSION }}"
          distribution: "${{ env.JDK_DISTRIBUTION }}"

      - name: Decode keystore and create init script
        working-directory: ./sshd4a_source
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.p12
          cat > dummy.properties << EOF
          sign.storeFile=dummy
          sign.storePassword=dummy
          sign.keyAlias=dummy
          sign.keyPassword=dummy
          EOF
          cat > init.gradle << 'EOF'
          allprojects {
              afterEvaluate { project ->
                  if (project.plugins.hasPlugin('com.android.application')) {
                      def releaseConfig = project.android.signingConfigs.findByName('release')
                      if (releaseConfig == null) {
                          releaseConfig = project.android.signingConfigs.create('release')
                      }
                      releaseConfig.storeFile = project.rootProject.file('app/keystore.p12')
                      releaseConfig.storePassword = System.getenv('KEYSTORE_PASSWORD')
                      releaseConfig.keyAlias = System.getenv('KEY_ALIAS')
                      releaseConfig.keyPassword = System.getenv('KEY_ALIAS_PASSWORD')
                      releaseConfig.storeType = 'PKCS12'
                      releaseConfig.enableV1Signing = true
                      releaseConfig.enableV2Signing = true
                      releaseConfig.enableV3Signing = true
                      if (project.android.buildTypes.findByName('release') != null) {
                          project.android.buildTypes.release.signingConfig = releaseConfig
                      }
                  }
              }
          }
          EOF

      - name: Build signed apk with init script
        working-directory: ./sshd4a_source
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_ALIAS_PASSWORD: ${{ secrets.KEY_ALIAS_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon -I init.gradle -P Sshd4a.properties=dummy.properties

      - name: List generated apk files
        working-directory: ./sshd4a_source
        run: |
          echo "Listing all apk files generated:"
          find app/build/outputs -type f -name "*.apk" | sort

      - name: Rename and move
        working-directory: ./sshd4a_source
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          APK_PATH=$(find app/build/outputs -type f -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No apk found"
            exit 1
          fi
          mv "$APK_PATH" "${{ github.workspace }}/dist/sshd4a-${{ env.BUILD_DATE }}.apk"

      - name: Erase keystore, encrypt package and create release
        uses: ./ci_source/.github/actions/erase_aes256pac_release/
        with:
          P12_KEYSTORE_PATH: "./sshd4a_source/app/keystore.p12"
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          BUILD_ARTIFACT_PATH: "./dist/sshd4a-${{ env.BUILD_DATE }}.apk"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-sshd4a"