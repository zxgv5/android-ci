name: build-apk-xed-editor
 
on:
  workflow_dispatch:
  workflow_call:
 
env:
  JDK_VERSION: '21'
  JDK_DISTRIBUTION: 'temurin'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clean runner environment
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          rm -rf ~/.android/build-cache/
          rm -rf .gradle
 
      - name: Checkout source repo
        uses: actions/checkout@main
        with:
          repository: Xed-Editor/Xed-Editor
          ref: main
          path: xed_editor_source
          fetch-depth: 0
          submodules: recursive
 
      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source
 
      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV
 
      - name: Setup java
        uses: actions/setup-java@main
        with:
          distribution: '${{ env.JDK_DISTRIBUTION }}'
          java-version: '${{ env.JDK_VERSION }}'
 
      # app/build.gradle.kts中，硬编码了xed.keystore和signing.properties的路径
      - name: Decode and create secrets
        run: |
          mkdir -p /tmp
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/xed.keystore
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" > /tmp/signing.properties
          echo "keyPassword=${{ secrets.KEY_ALIAS_PASSWORD }}" >> /tmp/signing.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> /tmp/signing.properties
 
      - name: Build release apk files
        working-directory: ./xed_editor_source
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon -Pandroid.ndk.abiFilters=arm64-v8a
 
      - name: Rename and move
        working-directory: ./xed_editor_source
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          mv ./app/build/outputs/apk/release/*.apk "${{ github.workspace }}/dist/xed-editor-${{env.BUILD_DATE}}.apk"
 
      - name: Erase keystore, encrypt package and create release
        uses: ./ci_source/.github/actions/erase_aes256pac_release/
        with:
          # 文件路径为基于github.workspace的绝对路径
          P12_KEYSTORE_PATH: "./tmp/xed.keystore"
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          BUILD_ARTIFACT_PATH: "./dist/xed-editor-${{env.BUILD_DATE}}.apk"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-xed-editor"