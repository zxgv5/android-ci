name: build-apk-fcitx5

on:
  workflow_dispatch:
  workflow_call:

env:
  JDK_VERSION: '21'
  JDK_DISTRIBUTION: 'temurin'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clean runner environment
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          rm -rf ~/.android/build-cache/
          rm -rf .gradle

      - name: Checkout source repo
        uses: actions/checkout@main
        with:
          repository: fcitx5-android/fcitx5-android
          ref: master
          path: fcitx5_source
          fetch-depth: 0
          submodules: recursive

      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y extra-cmake-modules gettext

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup java
        uses: actions/setup-java@main
        with:
          java-version: "${{ env.JDK_VERSION }}"
          distribution: "${{ env.JDK_DISTRIBUTION }}"

      - name: Decode keystore and create init script
        working-directory: ./fcitx5_source
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.p12
          cat > init.gradle << EOF
          allprojects {
              afterEvaluate { project ->
                  if (project.plugins.hasPlugin('com.android.application')) {
                      if (!project.android.signingConfigs.hasProperty('release')) {
                          project.android.signingConfigs.create('release')
                      }
                      def releaseConfig = project.android.signingConfigs.getByName('release')
                      releaseConfig.storeFile = project.rootProject.file('app/keystore.p12')
                      releaseConfig.storePassword = System.getenv('KEYSTORE_PASSWORD')
                      releaseConfig.keyAlias = System.getenv('KEY_ALIAS')
                      releaseConfig.keyPassword = System.getenv('KEYSTORE_PASSWORD')
                      releaseConfig.storeType = 'PKCS12'
                      releaseConfig.enableV1Signing = true
                      releaseConfig.enableV2Signing = true
                      releaseConfig.enableV3Signing = true
                      project.android.buildTypes.release.signingConfig = releaseConfig
                  }
              }
          }
          EOF

      - name: Build signed apk with init script
        working-directory: ./fcitx5_source
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon -I init.gradle

      - name: List generated apk files
        working-directory: ./fcitx5_source
        run: |
          echo "Listing all apk files generated:"
          find app/build/outputs -type f -name "*.apk" | sort
          find plugin/*/build/outputs -type f -name "*.apk" | sort

      - name: Rename and move
        working-directory: ./fcitx5_source
        run: |
          mkdir -p "${{ github.workspace }}/fcitx5"
          mv "./app/build/outputs/apk/release/org.fcitx.fcitx5.android"*"arm64-v8a-release.apk" "${{ github.workspace }}/fcitx5/fcitx5-${{ env.BUILD_DATE }}.apk"
          for apk in plugin/*/build/outputs/apk/release/*.apk; do
              filename=$(basename "$apk")
              if [[ "$filename" =~ ^org\.fcitx\.fcitx5\.android\.plugin\.([^-]+)-.*-(arm64-v8a|armeabi-v7a|x86|x86_64)-release\.apk$ ]]; then
                  plugin="${BASH_REMATCH[1]}"
                  arch="${BASH_REMATCH[2]}"
                  newname="fcitx5.plugin.${plugin}-${arch}.apk"
              # 单独处理匹配无架构的格式 (如 clipboard_filter)
              elif [[ "$filename" =~ ^org\.fcitx\.fcitx5\.android\.plugin\.([^-]+)-.*-release\.apk$ ]]; then
                  plugin="${BASH_REMATCH[1]}"
                  newname="fcitx5.plugin.${plugin}.apk"
              else
                  echo "警告: 无法解析文件名 $filename" >&2
                  continue
              fi
              mv -v "$apk" "/fcitx5/$newname"
          done

      - name: Erase keystore, encrypt package and create release
        uses: ./ci_source/.github/actions/erase_aes256pac_release/
        with:
          P12_KEYSTORE_PATH: "./fcitx5_source/app/keystore.p12"
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          BUILD_ARTIFACT_PATH: "./fcitx5"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-fcitx5"