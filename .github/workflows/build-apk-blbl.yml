name: build-apk-blbl
 
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 0.1.18)"
        default: '0.1.26'
        required: true
 
env:
  JDK_VERSION: '24'
  JDK_DISTRIBUTION: 'temurin'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
 
permissions:
  contents: write
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clean runner environment
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          rm -rf ~/.android/build-cache/
          rm -rf .gradle
 
      - name: Checkout source repo
        uses: actions/checkout@main
        with:
          repository: cat3399/blbl
          ref: main
          path: blbl_source
          fetch-depth: 0
          submodules: recursive
 
      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source
 
      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV
 
      - name: Setup java
        uses: actions/setup-java@main
        with:
          java-version: "${{ env.JDK_VERSION }}"
          distribution: "${{ env.JDK_DISTRIBUTION }}"
 
      - name: Decode keystore
        working-directory: ./blbl_source
        run: |
          mkdir -p ./keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ./keystore/release.keystore
 
      # 作者已revert致此问题的提交，故注释步骤
      # - name: Patch source files
      #   working-directory: ./blbl_source
      #   run: |
      #     sed -i 's/recyclerView\.smoothScrollBy(0, dy)/recyclerView.scrollBy(0, dy)/g' app/src/main/java/blbl/cat3399/core/ui/DpadGridController.kt
 
      # 调大进度条缩略图不同档位对应的窗口尺寸
      - name: Modify videoshot preview size
        working-directory: ./blbl_source
        run: |
          VIDEOSHOT_DIMENS_FILE="app/src/main/res/values/dimens.xml"
          sed -i 's/name="player_videoshot_preview_short_edge_small">[0-9]*dp</name="player_videoshot_preview_short_edge_small">90dp</' "$VIDEOSHOT_DIMENS_FILE"
          sed -i 's/name="player_videoshot_preview_short_edge_medium">[0-9]*dp</name="player_videoshot_preview_short_edge_medium">153dp</' "$VIDEOSHOT_DIMENS_FILE"
          sed -i 's/name="player_videoshot_preview_short_edge_large">[0-9]*dp</name="player_videoshot_preview_short_edge_large">216dp</' "$VIDEOSHOT_DIMENS_FILE"
 
      # 根据建议，完成下面的patch后
      # 在大会员登录条件下，可获取会员画质
      - name: Patch file for vip quality
        working-directory: ./blbl_source
        run: |
          CAT3399_BLBL_APPVIDEOGRPCTRANSPORT_KT="app/src/main/java/blbl/cat3399/core/api/video/app/AppVideoGrpcTransport.kt"
          sed -i 's/private const val APP_MOBI_APP = "android_hd"/private const val APP_MOBI_APP = "android"/g' "$CAT3399_BLBL_APPVIDEOGRPCTRANSPORT_KT"
          cat "$CAT3399_BLBL_APPVIDEOGRPCTRANSPORT_KT"
 
      - name: Patch file for dependencies update
        working-directory: ./blbl_source
        run: |
          # 1. 升级 Kotlin 插件版本到 2.3.21
          sed -i 's/\(org\.jetbrains\.kotlin\.\(android\|jvm\)"\) version "[^"]*"/\1 version "2.3.21"/g' build.gradle.kts
          sed -i 's/\(kotlin("android")\) version "[^"]*"/\1 version "2.3.21"/g' build.gradle.kts
          # 2. 更新 kotlinx-coroutines 到与 Kotlin 2.3.21 兼容的版本
          sed -i 's/\(kotlinx-coroutines-android:\)[0-9.]*/\11.9.0/g' app/build.gradle.kts
          sed -i 's/\(kotlinx-coroutines-test:\)[0-9.]*/\11.9.0/g' app/build.gradle.kts
          # 3. 升级 media3 到 1.10.1
          sed -i 's/\(androidx\.media3:media3-[^:]*:\)[0-9.]*/\11.10.1/g' app/build.gradle.kts
          # 4. 升级 okhttp 到 5.3.2
          sed -i 's/\(com\.squareup\.okhttp3:okhttp:\)[0-9.]*/\15.3.2/g' app/build.gradle.kts
          # 5. 修改 minSdk 为 23
          sed -i 's/minSdk = 21/minSdk = 23/' app/build.gradle.kts
          # 6. 升级 gRPC 所有模块到 1.81.0
          sed -i 's/\(io\.grpc:[^:]*:\)[0-9.]*/\11.81.0/g' app/build.gradle.kts
          # 7. 升级 AGP 到 8.13.1
          sed -i 's/version "8\.5\.2"/version "8.13.1"/g' build.gradle.kts
          # 8. 升级 protobuf 插件到 0.10.0
          sed -i 's/version "0\.9\.4"/version "0.10.0"/g' build.gradle.kts
          # 9. 升级 Gradle wrapper 到 8.13（适配 AGP 8.13.1）
          sed -i 's/gradle-8\.7-bin\.zip/gradle-8.13-bin.zip/' gradle/wrapper/gradle-wrapper.properties
          # 验证修改
          cat build.gradle.kts
          cat app/build.gradle.kts
 
      - name: Build release apk
        working-directory: ./blbl_source
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease -PversionName="${{ inputs.version_name }}" -PversionCode="${{ github.run_number }}"
 
      - name: Rename and move
        working-directory: ./blbl_source
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          mv ./app/build/outputs/apk/release/app-release.apk "${{ github.workspace }}/dist/blbl-${{ env.BUILD_DATE }}.apk"
 
      - name: Erase keystore, encrypt package and create release
        uses: ./ci_source/.github/actions/erase_aes256pac_release/
        with:
          # 文件路径为基于github.workspace的绝对路径
          P12_KEYSTORE_PATH: "./blbl_source/keystore/release.keystore"
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          BUILD_ARTIFACT_PATH: "./dist/blbl-${{ env.BUILD_DATE }}.apk"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-blbl"
