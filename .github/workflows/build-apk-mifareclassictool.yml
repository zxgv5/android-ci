name: build-apk-mifareclassictool

on:
  workflow_dispatch:
  workflow_call:

env:
  JDK_VERSION: '21'
  JDK_DISTRIBUTION: 'temurin'
  ANDROID_COMPILE_SDK: '35'
  ANDROID_BUILD_TOOLS: '35.0.0'
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clean runner environment
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          rm -rf ~/.android/build-cache/
          rm -rf .gradle

      - name: Checkout source repo
        uses: actions/checkout@main
        with:
          repository: ikarus23/MifareClassicTool
          ref: master
          path: mct_source
          fetch-depth: 0
          submodules: recursive

      - name: Checkout ci source repo (self)
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Initialization values
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Setup java
        uses: actions/setup-java@main
        with:
          distribution: '${{ env.JDK_DISTRIBUTION }}'
          java-version: '${{ env.JDK_VERSION }}'

      - name: Install android sdk components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-${{ env.ANDROID_COMPILE_SDK }}" "build-tools;${{ env.ANDROID_BUILD_TOOLS }}"

      - name: Write keystore info
        working-directory: ./mct_source
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/mct_source/release.keystore
          echo "KEYSTORE_FILE=${{ github.workspace }}/mct_source/release.keystore" >> gradle.properties
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> gradle.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_ALIAS_PASSWORD }}" >> gradle.properties

      - name: Inject signing config and abi filter
        working-directory: "./mct_source/Mifare Classic Tool"
        run: |
          cat >> app/build.gradle << 'EOF'
          // CI injected signing config
          android.signingConfigs.create('release') {
              storeFile file(KEYSTORE_FILE)
              storePassword KEYSTORE_PASSWORD
              keyAlias KEY_ALIAS
              keyPassword KEY_PASSWORD
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          // CI injected ABI filter (arm64-v8a only)
          android.defaultConfig.ndk.abiFilters = ['arm64-v8a']
          EOF

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@main
        with:
          dependency-graph: generate-and-submit
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Build with gradle
        working-directory: "./mct_source/Mifare Classic Tool"
        run: |
          chmod +x ./gradlew
          ./gradlew clean app:assembleRelease

      - name: Rename and move
        working-directory: "./mct_source/Mifare Classic Tool"
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          SIGNED_APK="app/build/outputs/apk/release/app-release.apk"
          mv "$SIGNED_APK" "${{ github.workspace }}/dist/mifareclassicTool-${{ env.BUILD_DATE }}.apk"

      - name: Erase keystore, encrypt package and create release
        uses: ./ci_source/.github/actions/erase_aes256pac_release/
        with:
          P12_KEYSTORE_PATH: "./mct_source/release.keystore"
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          BUILD_ARTIFACT_PATH: "$./dist/mifareclassictool-${{ env.BUILD_DATE }}.apk"
          RELEASE_TAG_NAME: "${{ env.VERSION_NAME }}-mifareclassictool"