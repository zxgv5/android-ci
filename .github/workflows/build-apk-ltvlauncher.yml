name: build-apk-ltvlauncher

on:
  workflow_dispatch:
  workflow_call:

env:
  JDK_VERSION: '21'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clean runner environment
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          rm -rf ~/.android/build-cache/
          rm -rf .gradle
 
      - name: Checkout source repo
        uses: actions/checkout@main
        with:
          repository: LeanBitLab/LtvLauncher
          ref: master
          path: ltvlauncher_source
          fetch-depth: 0
          submodules: recursive

      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV
 
      - name: Set version variables
        id: version
        working-directory: ./ltvlauncher_source
        run: |
          # 使用运行编号作为 build number，保证每次递增
          echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_OUTPUT
          # 版本名例如日期，可根据需要调整
          echo "FULL_VERSION_NUMBER=${{ env.BUILD_DATE }}" >> $GITHUB_OUTPUT

      - name: Setup java
        uses: actions/setup-java@main
        with:
          distribution: 'temurin'
          java-version: '${{ env.JDK_VERSION }}'

      - name: Install flutter
        uses: subosito/flutter-action@main
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Accept android licenses
        working-directory: ./ltvlauncher_source
        run: yes | flutter doctor --android-licenses || true

      - name: Write keystore info
        working-directory: ./ltvlauncher_source
        run: |
          mkdir -p android/app
          # 实际为p12，非jks，懒得改构建代码了
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
 
      - name: Build with flutter
        working-directory: ./ltvlauncher_source
        env:
          FLAUNCHER_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          FLAUNCHER_SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          FLAUNCHER_SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          BUILD_NUMBER: ${{ steps.version.outputs.BUILD_NUMBER }}
          FULL_VERSION_NUMBER: ${{ steps.version.outputs.FULL_VERSION_NUMBER }}
        run: |
          echo 'org.gradle.caching=true' >> android/gradle.properties
          echo 'org.gradle.parallel=true' >> android/gradle.properties
          flutter --no-color build apk --release \
            --build-number $BUILD_NUMBER \
            --build-name=$FULL_VERSION_NUMBER
 
      - name: Rename and move
        working-directory: ./ltvlauncher_source
        run: |
          mkdir -p "${{ github.workspace }}/dist"
          mv "./build/app/outputs/flutter-apk/app-arm64-v8a-release.apk" "${{ github.workspace }}/dist/ltvlauncher-${{ env.BUILD_DATE }}.apk"
 
      - name: Erase keystore, encrypt package and create release
        uses: ./ci_source/.github/actions/erase_aes256pac_release/
        with:
          P12_KEYSTORE_PATH: "./ltvlauncher_source/android/app/upload-keystore.jks"
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          BUILD_ARTIFACT_PATH: "./dist/ltvlauncher-${{ env.BUILD_DATE }}.apk"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-ltvlauncher"