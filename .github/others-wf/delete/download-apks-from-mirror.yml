name: download-apks-from-mirror

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "包名"
        required: true
        type: string
        default: "com.cxinventor.file.explorer;org.freedownloadmanager.fdm;com.rhmsoft.edit;com.rhmsoft.code;mark.via.gp;com.flyersoft.moonreader;com.azure.authenticator;org.mozilla.focus;com.mxtech.videoplayer.ad"
      architecture:
        description: "架构(universal等)"
        required: false
        default: "arm64-v8a"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Generate timestamp
        run: echo "BUILD_DATE=$(TZ=UTC-8 date +'%y.%m.%d-%H.%M.%S')" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: '20'

      - name: Install apkmirror-downloader
        run: |
          npm init -y
          npm install apkmirror-downloader

      - name: Prepare download configuration
        run: |
          set -euo pipefail
          DOWNLOAD_DIR="./apks-mirror-${{ env.BUILD_DATE }}"
          mkdir -p "$DOWNLOAD_DIR"
          IFS=';' read -ra packages <<< "${{ inputs.package_name }}"
          echo "{" > apps.json
          echo '  "options": {' >> apps.json
          echo '    "arch": "${{ inputs.architecture }}",' >> apps.json
          echo '    "outDir": "'$DOWNLOAD_DIR'",' >> apps.json   # 注意这里增加了末尾逗号
          echo '    "dpi": "nodpi",' >> apps.json                # 新增
          echo '    "fallbackArch": "universal"' >> apps.json    # 新增（无逗号）
          echo '  },' >> apps.json
          echo '  "apps": [' >> apps.json
          first=true
          for pkg in "${packages[@]}"; do
            pkg_trimmed=$(echo "$pkg" | xargs)
            if [ -n "$pkg_trimmed" ]; then
              IFS='.' read -ra parts <<< "$pkg_trimmed"
              org="${parts[1]}-inc"
              repo="${parts[-1]}"
              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> apps.json
              fi
              echo '    {' >> apps.json
              echo '      "org": "'$org'",' >> apps.json
              echo '      "repo": "'$repo'",' >> apps.json
              echo '      "outFile": "'$pkg_trimmed'"' >> apps.json
              echo '    }' >> apps.json
            fi
          done
          echo '  ]' >> apps.json
          echo "}" >> apps.json
          cat apps.json
 
      - name: Download apks using node.js script
        run: |
          set -euo pipefail
          cat > download.js << 'EOF'
          const fs = require('fs');
          const { APKMirrorDownloader } = require('apkmirror-downloader');
          const config = JSON.parse(fs.readFileSync('apps.json', 'utf8'));
          const { options, apps } = config;
          const failedApps = [];
          (async () => {
            const downloader = new APKMirrorDownloader(options);
            for (const app of apps) {
              console.log(`正在下载：${app.org}/${app.repo}`);
              try {
                await downloader.download({
                  org: app.org,
                  repo: app.repo,
                  outFile: app.outFile
                });
                console.log(`✅ 下载成功：${app.outFile}`);
              } catch (err) {
                console.error(`❌ 下载失败：${app.org}/${app.repo} - ${err.message}`);
                failedApps.push(app);
              }
            }
            if (failedApps.length > 0) {
              console.error('\n以下应用下载失败：');
              failedApps.forEach(app => console.error(`- ${app.org}/${app.repo}`));
              process.exit(1);
            }
          })().catch(err => {
            console.error('脚本执行出错：', err);
            process.exit(1);
          });
          EOF
          node download.js
          echo "下载完成，文件清单："
          ls -lh "./apks-mirror-${{ env.BUILD_DATE }}/"
 
      - name: Encrypt apks and create release
        uses: ./ci_source/.github/actions/aes256pac_release/
        with:
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          ARTIFACT_DIRECTORY_PATH: "./apks-mirror-${{ env.BUILD_DATE }}"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-from-mirror"